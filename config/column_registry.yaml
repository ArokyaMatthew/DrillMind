# =============================================================================
# DrillMind Column Registry
# =============================================================================
# Canonical mapping from raw Volve CSV column names to standardized internal
# names.  Every module in DrillMind references this file for column names —
# never hardcode raw CSV headers anywhere else in the codebase.
#
# The "raw" key is the EXACT header string in the downloaded CSV.
# The "name" key is the standardized internal name used across DrillMind.
# The "unit" key is the physical unit as stated in the raw header.
# The "category" groups parameters for downstream processing.
# =============================================================================

# ---- RTOC-critical drilling parameters (time-indexed) ----
# These are the columns an RTOC analyst monitors on every shift.

time_index:
  raw: "DateTime parsed"
  name: "datetime"
  unit: "ISO8601"
  category: "index"

